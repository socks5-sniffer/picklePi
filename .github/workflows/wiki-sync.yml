name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/Components/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Clone wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git" wiki-repo

      - name: Copy wiki pages
        run: |
          cp wiki/Components/Home.md               wiki-repo/Home.md
          cp wiki/Components/Architecture.md        wiki-repo/Architecture.md
          cp wiki/Components/Curriculum-Overview.md wiki-repo/Curriculum-Overview.md
          cp wiki/Components/Adding-New-Content.md  wiki-repo/Adding-New-Content.md
          cp wiki/Components/Features.md            wiki-repo/Features.md
          cp wiki/Components/Getting-Started.md     wiki-repo/Getting-Started.md
          cp wiki/Components/_Sidebar.md            wiki-repo/_Sidebar.md
          # Remove legacy file that used a non-breaking hyphen in its name
          rm -f "wiki-repo/Adding"$'\xe2\x80\x90'"New"$'\xe2\x80\x90'"Content.md"

      - name: Commit and push to wiki
        run: |
          cd wiki-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Sync wiki pages from wiki/Components/"
          git push
