<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="picklePi: A gamified learning platform for mastering electronics and Python with Raspberry Pi. Learn GPIO, sensors, displays, and more through hands-on projects." />
    <meta name="keywords" content="picklePi, Raspberry Pi, Electronics, Education, Python, GPIO, Maker, STEM, Learning" />
    <meta name="author" content="socks5-sniffer" />
    <!-- CSP is delivered via HTTP headers only (vite.config.ts for dev/preview,
         vercel.json and public/_headers for production). A meta CSP here would
         intersect with those policies and break Vite's dev-mode HMR injection. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta property="og:title" content="picklePi - Raspberry Pi Electronics Lab" />
    <meta property="og:description" content="Master electronics through gamified, hands-on Raspberry Pi projects" />
    <meta property="og:type" content="website" />
    <title>picklePi - Learn Electronics Through Raspberry Pi Projects</title>
    <!-- Runs synchronously before any CSS/JS to prevent a theme flash.
         External (not inline) so production CSP needs no script hash. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
