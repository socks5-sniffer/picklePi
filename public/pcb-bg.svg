<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Secondary layer – thin, dimmer traces for depth -->
  <g stroke="rgba(52,211,153,0.07)" stroke-width="0.9" fill="none">
    <line x1="0"   y1="100" x2="400" y2="100"/>
    <line x1="0"   y1="260" x2="400" y2="260"/>
    <line x1="40"  y1="0"   x2="40"  y2="400"/>
    <line x1="250" y1="0"   x2="250" y2="145"/>
    <line x1="250" y1="162" x2="250" y2="400"/>
    <line x1="340" y1="55"  x2="340" y2="400"/>
  </g>
  <!-- Secondary pads -->
  <g stroke="rgba(52,211,153,0.14)" stroke-width="1" fill="rgba(52,211,153,0.03)">
    <circle cx="40"  cy="100" r="4"/>
    <circle cx="250" cy="100" r="4"/>
    <circle cx="40"  cy="260" r="4"/>
    <circle cx="250" cy="260" r="4"/>
    <circle cx="340" cy="260" r="4"/>
    <circle cx="340" cy="100" r="3.5"/>
  </g>
  <g fill="rgba(52,211,153,0.2)">
    <circle cx="40"  cy="100" r="1.5"/>
    <circle cx="250" cy="100" r="1.5"/>
    <circle cx="40"  cy="260" r="1.5"/>
    <circle cx="250" cy="260" r="1.5"/>
    <circle cx="340" cy="260" r="1.5"/>
    <circle cx="340" cy="100" r="1.2"/>
  </g>

  <!-- Primary layer traces -->
  <g stroke="rgba(52,211,153,0.14)" stroke-width="1.6" fill="none">
    <!-- Horizontal -->
    <line x1="0"   y1="60"  x2="400" y2="60"/>
    <line x1="90"  y1="150" x2="400" y2="150"/>
    <line x1="0"   y1="230" x2="310" y2="230"/>
    <line x1="0"   y1="320" x2="400" y2="320"/>
    <!-- Vertical -->
    <line x1="90"  y1="0"   x2="90"  y2="400"/>
    <line x1="200" y1="60"  x2="200" y2="400"/>
    <line x1="310" y1="0"   x2="310" y2="230"/>
  </g>

  <!-- Pad outer glow (soft halo) -->
  <g fill="rgba(52,211,153,0.055)">
    <circle cx="90"  cy="60"  r="18"/>
    <circle cx="200" cy="60"  r="18"/>
    <circle cx="310" cy="60"  r="15"/>
    <circle cx="90"  cy="150" r="18"/>
    <circle cx="200" cy="150" r="18"/>
    <circle cx="310" cy="150" r="15"/>
    <circle cx="90"  cy="230" r="18"/>
    <circle cx="200" cy="230" r="18"/>
    <circle cx="310" cy="230" r="18"/>
    <circle cx="90"  cy="320" r="18"/>
    <circle cx="200" cy="320" r="18"/>
  </g>

  <!-- Pad rings -->
  <g stroke="rgba(52,211,153,0.3)" stroke-width="1.5" fill="rgba(52,211,153,0.07)">
    <circle cx="90"  cy="60"  r="7"/>
    <circle cx="200" cy="60"  r="7"/>
    <circle cx="310" cy="60"  r="5.5"/>
    <circle cx="90"  cy="150" r="7"/>
    <circle cx="200" cy="150" r="7"/>
    <circle cx="310" cy="150" r="6"/>
    <circle cx="90"  cy="230" r="7"/>
    <circle cx="200" cy="230" r="7"/>
    <circle cx="310" cy="230" r="7"/>
    <circle cx="90"  cy="320" r="7"/>
    <circle cx="200" cy="320" r="7"/>
  </g>

  <!-- Pad center dots (brightest point) -->
  <g fill="rgba(52,211,153,0.42)">
    <circle cx="90"  cy="60"  r="2.8"/>
    <circle cx="200" cy="60"  r="2.8"/>
    <circle cx="310" cy="60"  r="2.2"/>
    <circle cx="90"  cy="150" r="2.8"/>
    <circle cx="200" cy="150" r="2.8"/>
    <circle cx="310" cy="150" r="2.4"/>
    <circle cx="90"  cy="230" r="2.8"/>
    <circle cx="200" cy="230" r="2.8"/>
    <circle cx="310" cy="230" r="2.8"/>
    <circle cx="90"  cy="320" r="2.8"/>
    <circle cx="200" cy="320" r="2.8"/>
  </g>
</svg>
